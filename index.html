<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense & Budget Visualizer</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Total Balance Display -->
        <div class="balance-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h1 style="margin-bottom: 0;">Expense & Budget Visualizer</h1>
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
                    <span id="theme-icon">🌙</span>
                </button>
            </div>
            <div id="total-balance" class="balance-amount" role="status" aria-live="polite" aria-label="Total spending balance">$0.00</div>
            <div style="margin-top: 15px;">
                <label for="spending-limit" style="font-size: 14px; margin-right: 8px;">Spending Limit:</label>
                <input type="number" id="spending-limit" step="0.01" min="0" placeholder="Set limit" style="padding: 8px; border: 2px solid var(--border-color); border-radius: 4px; width: 150px;" aria-label="Set spending limit">
            </div>
        </div>

        <!-- Transaction Input Form -->
        <div class="form-section">
            <h2>Add Transaction</h2>
            <form id="transaction-form">
                <div class="form-group">
                    <label for="item-name">Item Name</label>
                    <input 
                        type="text" 
                        id="item-name" 
                        name="item-name" 
                        aria-label="Item name"
                        aria-required="true"
                        required>
                </div>

                <div class="form-group">
                    <label for="amount">Amount</label>
                    <input 
                        type="number" 
                        id="amount" 
                        name="amount" 
                        step="0.01" 
                        min="0.01"
                        aria-label="Transaction amount in dollars"
                        aria-required="true"
                        required>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select 
                        id="category" 
                        name="category"
                        aria-label="Transaction category"
                        aria-required="true"
                        required>
                        <option value="">Select a category</option>
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Fun">Fun</option>
                    </select>
                </div>

                <div id="error-message" class="error-message" role="alert" aria-live="polite"></div>

                <button type="submit" class="btn-submit" aria-label="Add transaction">Add Transaction</button>
            </form>
        </div>

        <!-- Transaction List and Chart Container -->
        <div class="content-section">
            <!-- Transaction List -->
            <div class="list-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h2 style="margin-bottom: 0;">Transactions</h2>
                    <div class="sort-controls">
                        <label for="sort-by" style="font-size: 14px; margin-right: 8px;">Sort by:</label>
                        <select id="sort-by" aria-label="Sort transactions by">
                            <option value="date">Date (newest first)</option>
                            <option value="amount-high">Amount (high to low)</option>
                            <option value="amount-low">Amount (low to high)</option>
                            <option value="category">Category</option>
                        </select>
                    </div>
                </div>
                <ul id="transaction-list" class="transaction-list" role="list" aria-label="List of transactions"></ul>
            </div>

            <!-- Pie Chart -->
            <div class="chart-section">
                <h2>Spending by Category</h2>
                <canvas id="spending-chart" role="img" aria-label="Pie chart showing spending distribution by category"></canvas>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
